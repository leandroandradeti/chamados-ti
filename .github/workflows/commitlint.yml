name: Commitlint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - main

jobs:
  lint-commits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli@19.8.0 @commitlint/config-conventional@19.8.0

      - name: Lint commits (PR)
        if: github.event_name == 'pull_request'
        run: |
          npm exec commitlint -- --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}" --verbose

      - name: Lint commit (push)
        if: github.event_name == 'push'
        run: |
          npm exec commitlint -- --from "${{ github.event.before }}" --to "${{ github.sha }}" --verbose
