name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix backend

      - name: Run lint (if available)
        run: |
          node -e "const p=require('./backend/package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1)" && npm --prefix backend run lint || echo "backend lint script not found, skipping"

      - name: Run tests
        run: npm --prefix backend test -- --passWithNoTests

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Debug lockfile TypeScript version
        run: |
          node -e "const lock=require('./frontend/package-lock.json'); const ts=lock?.packages?.['node_modules/typescript']?.version || 'not-found'; console.log('LOCK_TYPESCRIPT=' + ts);"

      - name: Install dependencies
        run: npm install --prefix frontend

      - name: Run lint (if available)
        run: |
          node -e "const p=require('./frontend/package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1)" && npm --prefix frontend run lint || echo "frontend lint script not found, skipping"

      - name: Build
        run: npm --prefix frontend run build

      - name: Run tests
        run: npm --prefix frontend test -- --watchAll=false --passWithNoTests
